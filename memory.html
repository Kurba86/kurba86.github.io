<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <link rel="stylesheet" type="text/css" href="memory.css">
</head>
<body>
  <form>
    <input type="color" name="color">
    <input type="text" name="name" required autofocus>
    <input type="submit">
  </form>
  <form>
    <fieldset style="width: 300px; background-color: pink; border-radius: 5px;">
      <legend>Работа со временем</legend>
       <input type="checkbox">Создание пунктуальности<br>
       <input type="checkbox">Извлечение от пунктуальности<br>
       <input type="checkbox">И еще хрень какая-то<br>
       <input type="button" name="rer" value="Закидывай">
    </fieldset>
    <select>
    <optgroup label="Цвет настроения:">
      <option>Черный</option>
      <option>Синий</option>
      <option>Красный</option>
    </optgroup>
  </select>
  <input type="number" min="35" max="41" value="37.7" step="0.1">
  </form>
  <progress value="53" max="100" min="0">Прогресс</progress>
  <div>
    <svg width="2000" height="2000">
      <rect width="150" height="150" fill="pink">
        <animate attributeName="x" from="0" to="900" dur="5s" fill="freeze" repeatCount="5" /></circle></svg>
  </div>

</body>
</html>
