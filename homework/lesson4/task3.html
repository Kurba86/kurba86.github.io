<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<!-- <link rel="stylesheet" href="style3.css"> -->
	<style type="text/css">
		div{
	width: 450px;
	background: lightpink;
	padding: 0;
	margin: 0 auto;
	border: 1px solid grey;
	border-radius: 5px;
	box-shadow: 4px 5px 4px #74adc9;
}
ul{
	list-style-type: none;
	padding: 0;


}

li{
	display: inline-block;
	margin: 3px 5px;
	/*font-size: 12px;*/

	/*color: #a47eef;*/
	/*padding: 5px;*/
}

li:nth-last-child(n+11):before{
	content: "« ";
	vertical-align: 0.9px;
	color:#a23cd0;
}
li:nth-child(n+11):after {
	content: " »";
	vertical-align: 0.9px;
	color:#a23cd0;
}
/*li.number:hover{
	cursor: pointer;
	background: #a23bd2;
	color: #ffffff;
}*/

.tochka{
	vertical-align: sub;
}
a{
	display: inline-block;
	color: #a23cd0;
	text-decoration: none;
	font-size: 12px;
	/*padding: 3px 5px;*/
}
.num:hover{
	background: #a23bd2;
	color: #ffffff;
}
.number{
	border: 1px solid grey;
	border-radius: 5px;
	margin: 0 3px 2px;
	/*padding: 3px 5px;*/

}
.num{
	padding: 3px 5px;
}
	</style>
</head>
<body>

		<div class="menu">
		<ul>
			<li class="first"><a href="#">FIRST</a></li>
			<li class="prev"><a href="#" >PREV</a></li>
			<li class="number"><a href="#" class="num">1</a></li>
			<li class="number"><a href="#" class="num">2</a></li>
			<li class="tochka">...</li>
			<li class="number"><a href="#" class="num">5</a></li>
			<li class="number"><a href="#" class="num">6</a></li>
			<li class="number"><a href="#" class="num">7</a></li>
			<li class="number"><a href="#" class="num">8</a></li>
			<li class="number"><a href="#" class="num">9</a></li>
			<li class="next"><a href="#">NEXT</a></li>
			<li class="last"><a href="#">LAST</a></li>
		</ul>
	</div>
	
</body>
</html>
